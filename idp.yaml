# ─── MiniIDP Configuration ───
# ไฟล์นี้ใช้กำหนดค่าการ deploy สำหรับแต่ละ service
# MiniIDP จะอ่านไฟล์นี้จาก repo และสร้าง Helm values + ArgoCD manifests ให้อัตโนมัติ
# ค่าที่ไม่ได้กำหนด (resources, probes ฯลฯ) จะใช้ chart defaults จาก base-microservice

# ─── Environments ───
# กำหนด branch → environment mapping
# branch ที่ไม่ได้ map ไว้จะถูก skip (ไม่ deploy)
# namespace/domain จะถูก enrich อัตโนมัติตอน bootstrap ถ้าไม่ได้กำหนด
# services: กำหนด config ของแต่ละ service เฉพาะ environment นั้นๆ
environments:
  dev:
    branch: develop
    enabled: true
    # namespace: project-dev            ← auto-generated ถ้าไม่ใส่
    # domain: project-dev.thaisee.com   ← auto-generated ถ้าไม่ใส่
    services:
      web:
        workload:
          containerPort: 3000
          replicas: 1
          env:
            - name: NODE_ENV
              value: development
        service:
          port: 3000
        ingress:
          enabled: true
          className: nginx
          hosts:
            - paths:
                - path: /
                  pathType: Prefix
        livenessProbe:
          enabled: true
          httpGet:
            path: /api/rest/health/liveness
            port: http
        readinessProbe:
          enabled: true
          httpGet:
            path: /api/rest/health/liveness
            port: http

  production:
    branch: main
    enabled: false # เปิดเมื่อพร้อม deploy production
    services:
      web:
        workload:
          containerPort: 3000
          replicas: 2
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: production
        service:
          port: 3000
        ingress:
          enabled: true
          className: nginx
          hosts:
            - paths:
                - path: /
                  pathType: Prefix
        livenessProbe:
          enabled: true
          httpGet:
            path: /api/rest/health/liveness
            port: http
        readinessProbe:
          enabled: true
          httpGet:
            path: /api/rest/health/readiness
            port: http
