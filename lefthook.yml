pre-commit:
  jobs:
    - name: lint-format
      run: pnpm check:fix
      glob:
        - "*.js"
        - "*.jsx"
        - "*.ts"
        - "*.tsx"
        - "*.json"
        - "*.jsonc"
        - "*.css"
      stage_fixed: true
    - name: parallel-checks
      group:
        parallel: true
        jobs:
          - name: audit-critical
            run: pnpm audit --audit-level critical
          - name: typecheck
            run: pnpm typecheck
          - name: lint-workspace
            run: pnpm lint:ws
          - name: build
            run: pnpm build
