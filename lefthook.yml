pre-commit:
  parallel: true
  jobs:
    - name: lint-format
      run: pnpm check:fix
      glob:
        - "*.js"
        - "*.jsx"
        - "*.ts"
        - "*.tsx"
        - "*.json"
        - "*.jsonc"
        - "*.css"
      stage_fixed: true
    - name: typecheck
      run: pnpm typecheck
    - name: build
      run: pnpm build
