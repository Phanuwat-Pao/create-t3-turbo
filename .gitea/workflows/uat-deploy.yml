name: UAT Deploy (uat)

on:
  push:
    branches:
      - uat

env:
  REGISTRY_URL: registry.telecorpthailand.com
  REGISTRY_PROJECT: turbo
  IMAGE_NAME: turbo-nextjs-uat
  SERVICE_NAME: turbo

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # ──────────────────────────────────────────────
      # 1. Checkout
      # ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ──────────────────────────────────────────────
      # 2. Generate Image Tag
      # ──────────────────────────────────────────────
      - name: Generate Image Tag
        run: |
          SHORT_SHA=$(echo "${{ gitea.sha }}" | cut -c1-7)
          IMAGE_TAG="${{ gitea.run_number }}-${SHORT_SHA}"
          FULL_IMAGE="${{ env.REGISTRY_URL }}/${{ env.REGISTRY_PROJECT }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITEA_ENV
          echo "FULL_IMAGE=${FULL_IMAGE}" >> $GITEA_ENV
          echo "Image Tag: ${IMAGE_TAG}"
          echo "Full Image: ${FULL_IMAGE}"

      # ──────────────────────────────────────────────
      # 3. Inject .env (from secret)
      # ──────────────────────────────────────────────
      - name: Inject Environment File
        run: |
          echo "Injecting UAT environment file..."
          echo "${{ secrets.ENV_FILE_UAT }}" > .env
          echo ".env injected successfully"

      # ──────────────────────────────────────────────
      # 4. Setup Node.js & Install Dependencies
      # ──────────────────────────────────────────────
      # - name: Setup Node.js
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: 24

      # - name: Install pnpm
      #   run: |
      #     npm i -g corepack@latest
      #     corepack enable

      # - name: Install dependencies
      #   run: |
      #     pnpm config set store-dir /tmp/.pnpm-store
      #     pnpm install --frozen-lockfile

      # ──────────────────────────────────────────────
      # 5. Lint & Typecheck
      # ──────────────────────────────────────────────
      # - name: Lint check
      #   run: pnpm run check:fix

      # - name: Typecheck
      #   run: pnpm run typecheck

      # ──────────────────────────────────────────────
      # 6. Build Docker Image
      # ──────────────────────────────────────────────
      - name: Build Docker Image
        run: |
          echo "Building Docker image..."
          docker build \
            -f docker/Dockerfile.nextjs \
            --build-arg COMMIT_SHA=${{ gitea.sha }} \
            -t ${{ env.FULL_IMAGE }} \
            -t ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_PROJECT }}/${{ env.IMAGE_NAME }}:latest \
            .
          echo "Docker build complete"

      # ──────────────────────────────────────────────
      # 7. Security Scan with Trivy
      # ──────────────────────────────────────────────
      - name: Security Scan with Trivy
        continue-on-error: true
        run: |
          echo "Running Trivy scan..."
          if ! command -v trivy &> /dev/null; then
            curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          fi
          mkdir -p trivy-report
          trivy image --exit-code 0 --severity CRITICAL,HIGH \
            --format json -o trivy-report/report.json ${{ env.FULL_IMAGE }} || true

      # ──────────────────────────────────────────────
      # 8. Push to Harbor
      # ──────────────────────────────────────────────
      - name: Login to Harbor
        run: |
          echo '${{ secrets.HARBOR_PASSWORD }}' | docker login ${{ env.REGISTRY_URL }} -u '${{ secrets.HARBOR_USERNAME }}' --password-stdin

      - name: Push to Harbor
        run: |
          echo "Pushing image to Harbor..."
          docker push ${{ env.FULL_IMAGE }}
          docker push ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_PROJECT }}/${{ env.IMAGE_NAME }}:latest
          echo "Push complete"

      # ──────────────────────────────────────────────
      # 9. Cleanup
      # ──────────────────────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          echo "Starting cleanup..."
          docker rmi ${{ env.FULL_IMAGE }} 2>/dev/null || true
          docker rmi ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_PROJECT }}/${{ env.IMAGE_NAME }}:latest 2>/dev/null || true
          docker system prune -f 2>/dev/null || true
          rm -rf trivy-report/ 2>/dev/null || true
          echo "Cleanup complete"
